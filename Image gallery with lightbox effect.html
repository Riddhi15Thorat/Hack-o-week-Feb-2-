<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>My Image Gallery</title>

      <style>
            body {
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  flex-direction: column;
                  min-height: 100vh;
                  margin: 0;
                  background-color: #f4f4f4;
                  font-family: Arial, sans-serif;
                  padding: 20px;
            }

            h1 {
                  margin-bottom: 30px;
                  color: #333;
                  font-size: 36px;
            }

            .gallery {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 20px;
                  justify-content: center;
                  max-width: 1200px;
            }

            .gallery-img {
                  width: 200px;
                  height: 200px;
                  object-fit: cover;
                  border-radius: 8px;
                  cursor: pointer;
                  transition: transform 0.3s ease;
                  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }

            .gallery-img:hover {
                  transform: scale(1.05);
            }

            .lightbox {
                  display: none;
                  position: fixed;
                  z-index: 1000;
                  left: 0;
                  top: 0;
                  width: 100%;
                  height: 100%;
                  background-color: rgba(0, 0, 0, 0.9);
                  justify-content: center;
                  align-items: center;
            }

            .lightbox-content {
                  width: 80%;
                  max-width: 700px;
                  border-radius: 8px;
            }

            .close {
                  position: absolute;
                  top: 20px;
                  right: 40px;
                  font-size: 35px;
                  color: white;
                  cursor: pointer;
            }
      </style>
</head>

<body>

      <h1>My Image Gallery</h1>

      <div class="gallery">
            <img src="https://images.pexels.com/photos/1192671/pexels-photo-1192671.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 1" class="gallery-img">
            <img src="https://images.pexels.com/photos/237272/pexels-photo-237272.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 2" class="gallery-img">
            <img src="https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 3" class="gallery-img">
            <img src="https://images.pexels.com/photos/994605/pexels-photo-994605.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 4" class="gallery-img">
            <img src="https://images.pexels.com/photos/414171/pexels-photo-414171.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 5" class="gallery-img">
            <img src="https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 6" class="gallery-img">
            <img src="https://images.pexels.com/photos/34950/pexels-photo.jpg?auto=compress&cs=tinysrgb&w=600" alt="Image 7" class="gallery-img">
            <img src="https://images.pexels.com/photos/355465/pexels-photo-355465.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 8" class="gallery-img">
            <img src="https://images.pexels.com/photos/674010/pexels-photo-674010.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 9" class="gallery-img">
            <img src="https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 10" class="gallery-img">
            <img src="https://images.pexels.com/photos/247600/pexels-photo-247600.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 11" class="gallery-img">
            <img src="https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Image 12" class="gallery-img">
      </div>

      <div id="lightbox" class="lightbox">
            <span class="close">&times;</span>
            <img class="lightbox-content" id="lightbox-img" alt="Lightbox Image">
      </div>

      <script>
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const galleryImgs = document.querySelectorAll('.gallery-img');

            galleryImgs.forEach(img => {
                  img.addEventListener('click', () => {
                        lightbox.style.display = 'flex';
                        lightboxImg.src = img.src;
                  });
            });

            document.querySelector('.close').addEventListener('click', () => {
                  lightbox.style.display = 'none';
            });

            lightbox.addEventListener('click', (e) => {
                  if (e.target === lightbox) {
                        lightbox.style.display = 'none';
                  }
            });
      </script>

</body>
</html>
