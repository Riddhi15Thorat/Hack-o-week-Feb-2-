<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Elite | Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.06);
        }

        .light-theme {
            --bg-body: #f1f5f9;
            --glass-bg: rgba(0, 0, 0, 0.03);
            --text-main: #1e293b;
            --text-dim: rgba(30, 41, 59, 0.6);
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Theme Toggle Switch */
        .theme-switch {
            position: absolute;
            top: 30px;
            right: 30px;
            cursor: pointer;
            background: var(--input-bg);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            z-index: 100;
        }

        .glass-card {
            width: 95%;
            max-width: 440px;
            padding: 40px;
            border-radius: 35px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
            position: relative;
        }

        .header { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8; letter-spacing: 2px; margin-bottom: 30px; color: var(--text-dim); }

        .search-box { position: relative; margin-bottom: 40px; }
        .search-box input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 16px 25px;
            border-radius: 18px;
            color: var(--text-main);
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .main-display { text-align: center; margin-bottom: 35px; }
        .temp-big { font-size: 100px; font-weight: 300; letter-spacing: -6px; line-height: 0.9; }
        .city-title { font-size: 34px; font-weight: 600; margin: 10px 0; }
        .cond-badge { display: inline-block; padding: 5px 15px; background: var(--input-bg); border-radius: 20px; font-size: 12px; color: var(--text-dim); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item {
            background: var(--input-bg);
            padding: 18px;
            border-radius: 22px;
            border: 1px solid var(--border);
        }

        .s-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .s-val { font-size: 17px; font-weight: 500; }

        .indicator { width: 100%; height: 3px; background: var(--border); margin-top: 10px; border-radius: 2px; }
        .bar { height: 100%; background: var(--text-main); border-radius: 2px; transition: width 1s ease; }
    </style>
</head>
<body onclick="initAudio()">

<div class="theme-switch" onclick="toggleTheme()">🌓 MODE</div>

<div class="glass-card">
    <div class="header">
        <span id="live-clock">22:23</span>
        <span>IND • PREMIUM</span>
    </div>

    <div class="search-box">
        <input type="text" id="citySearch" placeholder="Search City (Mumbai, Nagpur...)" autocomplete="off">
    </div>

    <div id="weather-info">
        <div class="main-display">
            <p class="cond-badge" id="cond">Atmospheric Clear</p>
            <div class="temp-big" id="temp">26°</div>
            <h1 class="city-title" id="city">Nagpur</h1>
        </div>

        <div class="grid">
            <div class="stat-item">
                <span class="s-label">Humidity</span>
                <span class="s-val" id="hum">42%</span>
                <div class="indicator"><div class="bar" id="hum-bar" style="width: 42%;"></div></div>
            </div>
            <div class="stat-item">
                <span class="s-label">UV Index</span>
                <span class="s-val" id="uv">03 Low</span>
                <div class="indicator"><div class="bar" id="uv-bar" style="width: 30%;"></div></div>
            </div>
            <div class="stat-item">
                <span class="s-label">Wind</span>
                <span class="s-val" id="wind">14 km/h</span>
            </div>
            <div class="stat-item">
                <span class="s-label">Visibility</span>
                <span class="s-val" id="vis">12 km</span>
            </div>
        </div>
    </div>
</div>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(f, type = 'sine') {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type; osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        playSound(1200); 
    }

    const database = {
        "mumbai": { city: "Mumbai", temp: "29°", hum: 82, wind: "22 km/h", cond: "Coastal Rain", uv: 2, uvT: "Low 02", vis: "05 km", bg: "#1e3a8a" },
        "nagpur": { city: "Nagpur", temp: "42°", hum: 18, wind: "08 km/h", cond: "Extreme Heat", uv: 10, uvT: "Severe 10", vis: "15 km", bg: "#450a0a" },
        "pune": { city: "Pune", temp: "26°", hum: 45, wind: "14 km/h", cond: "Clear Breezy", uv: 4, uvT: "Mid 04", vis: "12 km", bg: "#0f172a" },
        "delhi": { city: "Delhi", temp: "28°", hum: 48, wind: "12 km/h", cond: "Dusty Haze", uv: 6, uvT: "High 06", vis: "04 km", bg: "#2d2d2d" },
        "bangalore": { city: "Bangalore", temp: "24°", hum: 55, wind: "16 km/h", cond: "Pleasant", uv: 4, uvT: "Mid 04", vis: "10 km", bg: "#064e3b" }
    };

    function updateWeather() {
        const input = document.getElementById("citySearch");
        const key = input.value.toLowerCase().trim();
        const data = database[key];

        if(data) {
            playSound(800);
            document.getElementById("city").innerText = data.city;
            document.getElementById("temp").innerText = data.temp;
            document.getElementById("hum").innerText = data.hum + "%";
            document.getElementById("hum-bar").style.width = data.hum + "%";
            document.getElementById("uv").innerText = data.uvT;
            document.getElementById("uv-bar").style.width = (data.uv * 10) + "%";
            document.getElementById("wind").innerText = data.wind;
            document.getElementById("vis").innerText = data.vis;
            document.getElementById("cond").innerText = data.cond;
            
            // Only update BG if NOT in Light Mode
            if(!document.body.classList.contains('light-theme')) {
                document.body.style.background = data.bg;
            }
            input.value = "";
        }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById("live-clock").innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);

    document.getElementById("citySearch").addEventListener("keypress", (e) => {
        if(e.key === "Enter") updateWeather();
    });
</script>

</body>
</html>
